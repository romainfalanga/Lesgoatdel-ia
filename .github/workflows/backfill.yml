name: Backfill articles

on:
  push:
    branches:
      - main
      - 'claude/**'
    # Triggered when someone commits a backfill request file.
    paths:
      - 'data/backfill-request.json'
  workflow_dispatch:
    inputs:
      month:
        description: "Month to backfill (YYYY-MM)"
        required: false
      from:
        description: "Start date (YYYY-MM-DD)"
        required: false
      to:
        description: "End date (YYYY-MM-DD)"
        required: false
      force:
        description: "Force re-process even already-seen videos"
        required: false
        default: "false"

concurrency:
  group: content-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install yt-dlp (TikTok)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip ffmpeg
          pip3 install --user --upgrade yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install deps
        run: npm ci || npm install

      - name: Refresh avatars
        run: node scripts/refresh-avatars.js
        continue-on-error: true

      - name: Run backfill
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="--month ${{ github.event.inputs.month }}"
          elif [ -n "${{ github.event.inputs.from }}" ] && [ -n "${{ github.event.inputs.to }}" ]; then
            ARGS="--from ${{ github.event.inputs.from }} --to ${{ github.event.inputs.to }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          node scripts/backfill.js $ARGS

      - name: Commit & push if changed
        run: |
          git config user.name "goats-bot"
          git config user.email "goats-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add src/content/articles src/data/creators.json data/seen.json data/backfill-archive.json
            git rm -f data/backfill-request.json 2>/dev/null || true
            git commit -m "chore(backfill): articles rétro-générés"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          else
            echo "No changes to commit"
          fi
