name: Monthly recap

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

concurrency:
  group: content-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  recap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci || npm install

      - name: Set reference date to last day of previous month
        id: refdate
        run: |
          ref=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m-%dT12:00:00Z)
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Generate monthly recap
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RECAP_REFERENCE_DATE: ${{ steps.refdate.outputs.ref }}
        run: node scripts/recap.js monthly

      - name: Commit & push if changed
        run: |
          git config user.name "goats-bot"
          git config user.email "goats-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain src/content/recaps)" ]; then
            git add src/content/recaps
            git commit -m "chore(recaps): récap mensuel [skip ci]"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          else
            echo "No monthly recap to publish"
          fi
